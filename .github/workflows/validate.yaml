name: HACS Action

# NOTE: This integration uses the domain 'google_assistant' which conflicts
# with the HA core integration. As a result, the 'brands' check will always
# fail. This integration is intentionally distributed as a HACS custom
# repository only — not submitted to the HACS default catalog.
# The 'continue-on-error' below prevents false failure notifications.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        continue-on-error: true
        with:
          category: integration
